<!DOCTYPE html>
<html lang="en">
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?     family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- css file -->
    <link rel="stylesheet" href="css/tailwind.init.css" />
    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font-awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      .geist-font {
        font-family: "Geist", sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
<body class="geist-font mx-auto bg-[#F8FAFC] min-h-screen">
<header class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- website name -->
      <h1
        class="text-2xl sm:text-3xl md:text-5xl bold text-[#002C5C] font-semibold pt-8 sm:pt-12 pb-4"
      >
        Job Application Tracker
      </h1>

      <!--dashboard Stats -->
      <div class="grid grid-cols-1 sm:grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white p-4 rounded shadow">
          <p class="text-gray-500 text-base-content/60 text-sm sm:text-base">
            Total
          </p>
          <p id="totalCount" class="text-xl font-bold">0</p>
        </div>

        <div class="bg-white p-4 rounded shadow">
          <p class="text-gray-500 text-base-content/60 text-sm sm:text-base">
            Interview
          </p>
          <p id="interviewCount" class="text-xl font-bold text-green-500">0</p>
        </div>

        <div id="rejected" class="bg-white p-4 rounded shadow">
          <p class="text-gray-500 text-base-content/60 text-sm sm:text-base">
            Rejected
          </p>
          <p id="rejectedCount" class="text-xl font-bold text-red-500">0</p>
        </div>
      </div>
    </header>
    <hr class="max-w-7xl mx-auto opacity-5" />
    
   <script src="js/script.js"></script> 
</body>
</html>
